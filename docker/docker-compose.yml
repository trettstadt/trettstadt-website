version: "3.8"

services:
  caddy:
    image: caddy:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  astro-site:
    image: ghcr.io/trettstadt/portfolio-astro:latest
    restart: always

volumes:
  caddy_data:
  caddy_config:
